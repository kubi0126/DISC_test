            display: block;

            margin: 30px auto;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .submit-btn:hover {
            background-color: #2980b9;
        }
        .results {
            display: none;
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top: 30px;
        }

        }

            margin-top: 0;

        }
        .progress-bar {
            height: 20px;
            background-color: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress {

        .i-progress { background-color: #f39c12; }
        .s-progress { background-color: #27ae60; }

            margin-top: 5px;
        }
        .description {
            margin-top: 10px;
            color: #7f8c8d;
            font-size: 14px;
        }
        .error {
            color: #e74c3c;
            text-align: center;

        // 生成测试问题
        function generateQuestions() {
            const form = document.getElementById('personalityTest');
            let html = '';
            
            questions.forEach((q, index) => {
                html += `
                <div class="question">
                    <h3>${q.question}</h3>
                    <div class="options">
                        ${q.options.map((opt, optIndex) => `
                        <div class="option">
                            <input type="radio" id="q${index}_${optIndex}" name="q${index}" value="${opt.type}">
                            <label for="q${index}_${optIndex}">${String.fromCharCode(65 + optIndex)}. ${opt.text}</label>
                        </div>
                        `).join('')}
                    </div>
                </div>
                `;
            });
            
            form.innerHTML = html;
        }

        // 计算结果
        function calculateResults() {
            // 检查是否所有问题都已回答
            let allAnswered = true;
            for (let i = 0; i < questions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (!selected) {
                    allAnswered = false;
                    break;
                }
            }
            
            if (!allAnswered) {
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            document.getElementById('errorMessage').style.display = 'none';
            
            // 统计各类型得分
            const scores = { D: 0, I: 0, S: 0, C: 0 };
            
            for (let i = 0; i < questions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (selected) {
                    scores[selected.value]++;
                }
            }
            
            // 计算百分比
            const total = questions.length;
            const percentages = {
                D: Math.round((scores.D / total) * 100),
                I: Math.round((scores.I / total) * 100),
                S: Math.round((scores.S / total) * 100),
                C: Math.round((scores.C / total) * 100)
            };
            
            // 显示结果
            displayResults(scores, percentages);
        }

                html += `
                <div class="result-item">
                    <h3>${type.name}</h3>
                    <div class="progress-bar">
                        <div class="progress ${type.key.toLowerCase()}-progress" style="width: ${percentages[type.key]}%"></div>
                    </div>
                    <div class="percentage" style="color: ${type.color}">${percentages[type.key]}%</div>
                    <div class="description">${type.description}</div>
                </div>
                `;
            });
            
            resultContent.innerHTML = html;
            resultsDiv.style.display = 'block';
            
            // 滚动到结果区域
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        }

        // 初始化
        window.onload = generateQuestions;
    </script>
</body>
</html>
